name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm_pkg: weoline-darwin-arm64
            binary: weoline
          - target: x86_64-apple-darwin
            os: macos-latest
            npm_pkg: weoline-darwin-x64
            binary: weoline
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: weoline-linux-x64
            binary: weoline
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_pkg: weoline-win32-x64
            binary: weoline.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary for upload
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cd dist
          if [ "${{ matrix.binary }}" = "weoline.exe" ]; then
            ARCHIVE="weoline-${{ matrix.target }}.zip"
            7z a "$ARCHIVE" ${{ matrix.binary }}
          else
            ARCHIVE="weoline-${{ matrix.target }}.tar.gz"
            tar czf "$ARCHIVE" ${{ matrix.binary }}
          fi
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARCHIVE }}

      - name: Copy binary to npm package
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} npm/${{ matrix.npm_pkg }}/

      - name: Copy README to npm package
        shell: bash
        run: cp README.md npm/${{ matrix.npm_pkg }}/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish platform npm package
        working-directory: npm/${{ matrix.npm_pkg }}
        run: npm publish --provenance --access public

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm_pkg }}
          path: npm/${{ matrix.npm_pkg }}/

  publish-main:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Copy README to npm package
        run: cp README.md npm/weoline/

      - name: Publish main npm package
        working-directory: npm/weoline
        run: npm publish --provenance --access public
