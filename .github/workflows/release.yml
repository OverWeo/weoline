name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm_pkg: weoline-darwin-arm64
            binary: weoline
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            npm_pkg: weoline-darwin-x64
            binary: weoline
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: weoline-linux-arm64
            binary: weoline
            cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: weoline-linux-x64
            binary: weoline
            cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            npm_pkg: weoline-win32-arm64
            binary: weoline.exe
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_pkg: weoline-win32-x64
            binary: weoline.exe
            cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y crossbuild-essential-arm64

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
          CXX_aarch64_unknown_linux_gnu: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-g++' || '' }}

      # x86_64-apple-darwin is not in ci.yml's matrix, so test it here
      - name: Run unit tests
        if: matrix.target == 'x86_64-apple-darwin'
        run: cargo test --target ${{ matrix.target }}

      - name: Run smoke tests
        if: matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: ./tests/smoke-test.sh
        env:
          WEOLINE_BIN: ./target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Prepare binary for upload
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cd dist
          if [ "${{ matrix.binary }}" = "weoline.exe" ]; then
            ARCHIVE="weoline-${{ matrix.target }}.zip"
            7z a "$ARCHIVE" ${{ matrix.binary }}
          else
            ARCHIVE="weoline-${{ matrix.target }}.tar.gz"
            tar czf "$ARCHIVE" ${{ matrix.binary }}
          fi
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Compute SHA256 for Homebrew formula
        if: matrix.binary != 'weoline.exe'
        shell: bash
        run: |
          set -euo pipefail
          SHA=$(shasum -a 256 dist/${{ env.ARCHIVE }} | awk '{print $1}')
          echo "$SHA" > sha256-${{ matrix.target }}.txt

      - name: Upload SHA256 artifact
        if: matrix.binary != 'weoline.exe'
        uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.target }}
          path: sha256-${{ matrix.target }}.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARCHIVE }}

      - name: Copy binary to npm package
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} npm/${{ matrix.npm_pkg }}/

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm_pkg }}
          path: npm/${{ matrix.npm_pkg }}/

  publish-crates:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-formula:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: update-formula
      cancel-in-progress: false

    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: OverWeo/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download SHA256 artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sha256-*
          merge-multiple: true
          path: sha256s

      - name: Write updated formula
        run: |
          set -euo pipefail
          MACOS_ARM=$(cat sha256s/sha256-aarch64-apple-darwin.txt)
          MACOS_X86=$(cat sha256s/sha256-x86_64-apple-darwin.txt)
          LINUX_ARM=$(cat sha256s/sha256-aarch64-unknown-linux-gnu.txt)
          LINUX_X86=$(cat sha256s/sha256-x86_64-unknown-linux-gnu.txt)
          [ -n "$MACOS_ARM" ] || { echo "macOS ARM SHA empty";  exit 1; }
          [ -n "$MACOS_X86" ] || { echo "macOS x86 SHA empty";  exit 1; }
          [ -n "$LINUX_ARM" ] || { echo "Linux ARM SHA empty";  exit 1; }
          [ -n "$LINUX_X86" ] || { echo "Linux x86 SHA empty";  exit 1; }
          export MACOS_ARM MACOS_X86 LINUX_ARM LINUX_X86
          python3 << 'PYEOF'
          import os
          version   = os.environ["VERSION"]
          macos_arm = os.environ["MACOS_ARM"]
          macos_x86 = os.environ["MACOS_X86"]
          linux_arm = os.environ["LINUX_ARM"]
          linux_x86 = os.environ["LINUX_X86"]
          formula = (
              'class Weoline < Formula\n'
              '  desc "Fast, cross-platform terminal statusline for Claude Code"\n'
              '  homepage "https://github.com/OverWeo/weoline"\n'
              f'  version "{version}"\n'
              '  license "Apache-2.0"\n'
              '\n'
              '  on_macos do\n'
              '    on_arm do\n'
              f'      url "https://github.com/OverWeo/weoline/releases/download/v{version}/weoline-aarch64-apple-darwin.tar.gz"\n'
              f'      sha256 "{macos_arm}"\n'
              '    end\n'
              '\n'
              '    on_intel do\n'
              f'      url "https://github.com/OverWeo/weoline/releases/download/v{version}/weoline-x86_64-apple-darwin.tar.gz"\n'
              f'      sha256 "{macos_x86}"\n'
              '    end\n'
              '  end\n'
              '\n'
              '  on_linux do\n'
              '    on_arm do\n'
              f'      url "https://github.com/OverWeo/weoline/releases/download/v{version}/weoline-aarch64-unknown-linux-gnu.tar.gz"\n'
              f'      sha256 "{linux_arm}"\n'
              '    end\n'
              '\n'
              '    on_intel do\n'
              f'      url "https://github.com/OverWeo/weoline/releases/download/v{version}/weoline-x86_64-unknown-linux-gnu.tar.gz"\n'
              f'      sha256 "{linux_x86}"\n'
              '    end\n'
              '  end\n'
              '\n'
              '  def install\n'
              '    bin.install "weoline"\n'
              '  end\n'
              '\n'
              '  test do\n'
              '    assert_match version.to_s, shell_output("#{bin}/weoline --version")\n'
              '  end\n'
              'end\n'
          )
          import os as _os
          _os.makedirs("Formula", exist_ok=True)
          with open("Formula/weoline.rb", "w") as f:
              f.write(formula)
          print("Formula written.")
          PYEOF

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/weoline.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update Homebrew formula to v${VERSION} [skip ci]"
          git push origin ${{ github.event.repository.default_branch }}

  publish-platform:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    strategy:
      matrix:
        npm_pkg:
          - weoline-darwin-arm64
          - weoline-darwin-x64
          - weoline-linux-arm64
          - weoline-linux-x64
          - weoline-win32-arm64
          - weoline-win32-x64

    steps:
      - uses: actions/checkout@v4

      - name: Download platform artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-${{ matrix.npm_pkg }}
          path: npm/${{ matrix.npm_pkg }}/

      - name: Copy README to npm package
        run: cp README.md npm/${{ matrix.npm_pkg }}/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish platform npm package
        working-directory: npm/${{ matrix.npm_pkg }}
        run: npm publish --provenance --access public

  publish-main:
    needs: publish-platform
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Copy README to npm package
        run: cp README.md npm/weoline/

      - name: Publish main npm package
        working-directory: npm/weoline
        run: npm publish --provenance --access public
