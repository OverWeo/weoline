name: CI

on:
  workflow_call:
  pull_request:
    branches: [master]
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: weoline
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: weoline
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: weoline.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      # --- Full build + tests ---
      - name: Build (full)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Unit tests (full)
        run: cargo test --target ${{ matrix.target }}

      - name: Smoke tests (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ./tests/smoke-test.sh
        env:
          WEOLINE_BIN: ./target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Smoke tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\tests\smoke-test.ps1
        env:
          WEOLINE_BIN: .\target\${{ matrix.target }}\release\${{ matrix.binary }}

      # --- Minimal build + tests ---
      - name: Build (minimal)
        run: cargo build --release --no-default-features --target ${{ matrix.target }}

      - name: Unit tests (minimal)
        run: cargo test --no-default-features --target ${{ matrix.target }}
